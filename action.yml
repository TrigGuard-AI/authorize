name: "TrigGuard Authorization"
description: "Authorize execution surfaces with TrigGuard. One-step install; verifies receipt locally."
author: "TrigGuard-AI"

branding:
  icon: shield
  color: blue

inputs:
  surface:
    description: "Execution surface (e.g. deploy.release, database.migrate)"
    required: true
  gateway_url:
    description: "Execution gateway base URL (staging or production). Same as endpoint/authorityUrl."
    required: false
  endpoint:
    description: "Alias for gateway_url (legacy)"
    required: false
  authorityUrl:
    description: "Alias for gateway_url (legacy)"
    required: false
  actor_id:
    description: "Actor identifier (maps to gateway actorId)"
    required: false
    default: "github-actions"
  actorId:
    description: "Alias for actor_id (legacy)"
    required: false
  workload_identity_provider:
    description: "GCP WIF provider resource id (projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL_ID/providers/PROVIDER_ID). Use with service_account for OIDC (no static secret)."
    required: false
  service_account:
    description: "GCP service account email to impersonate (must have roles/run.invoker on the gateway). Use with workload_identity_provider."
    required: false
  authToken:
    description: "Legacy static bearer (e.g. TRIGGUARD_CLOUD_TOKEN). Prefer workload_identity_provider + service_account."
    required: false
  repository:
    description: "GitHub owner/repo (e.g. org/repo). Pass github.repository so policy can allowlist deploy.release per repo."
    required: false
  branch:
    description: "Branch or ref name (optional). Passed in execution context for policy."
    required: false
  execution_mode:
    description: "enforce (default) or observe — evaluate policy without blocking the workflow when observe."
    required: false
    default: "enforce"

outputs:
  decision:
    description: "Effective authorization decision (PERMIT when the step succeeds; in observe mode this is always PERMIT)"
  would-decision:
    description: "Policy evaluation when execution_mode is observe (PERMIT, DENY, or SILENCE)"
  would_decision:
    description: "Alias for would-decision"
  execution-token:
    description: "TG-EAT JWT from POST /execute — pass to trigguard-verify-execution-token"
  execution_token:
    description: "Alias for execution-token"
  execution-id:
    description: "Execution ID from gateway response or receipt"
  execution_id:
    description: "Alias for execution-id"
  receipt:
    description: "JSON-serialized signed TrigGuard receipt"

runs:
  using: "node20"
  main: "index.js"
